title: Storm-1175 Suspicious User Account Creation via Net Command
description: Detects creation of new user accounts under administrative groups using
  the net command, indicative of Storm-1175 persistence and privilege escalation.
id: 1a2b3c4d-5e6f-4789-abcd-1234567890ab
tags:
- attack.t1136
- attack.t1078
level: high
status: experimental
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
    - \net.exe
    CommandLine|contains:
    - user
    - add
  condition: selection
